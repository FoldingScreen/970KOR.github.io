<!DOCTYPE html>

<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>970KOR 바이킹의 역습</title>

<style>

body{
font-family:sans-serif;
margin:20px;
text-align:center;
}

/* 로그인 */

#login{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
height:100vh;
}

#login input{
width:260px;
font-size:16px;
padding:8px;
margin:8px;
}

#login button{
width:150px;
font-size:16px;
padding:8px;
}

/* 메인 */

#main{
display:none;
}

/* 상단 */

.topbar{
position:fixed;
top:15px;
right:20px;
font-size:14px;
background:white;
padding:5px 10px;
border-radius:6px;
box-shadow:0 0 5px rgba(0,0,0,0.1);
}

/* 버튼 공통 */

button{
padding:8px 12px;
margin:3px;
cursor:pointer;
border:1px solid #999;
background:#f5f5f5;
border-radius:4px;
}

/* 관리자 버튼 */

.adminPanel{
margin-top:10px;
}

.adminPanel button{
background:#ffe3e3;
border:1px solid #ff8a8a;
}

/* 레이아웃 */

.layout{
display:flex;
gap:30px;
align-items:flex-start;
margin-top:30px;
}

.column{
display:flex;
flex-direction:column;
height:650px;
}

.column.my{
flex:1;
min-width:220px;
}

.column.open{
flex:4;
}

.column.closed{
flex:2;
}

/* 스크롤 */

.scroll{
flex:1;
overflow-y:auto;
}

/* 그리드 */

.gridMy{
display:grid;
grid-template-columns:1fr;
gap:15px;
min-height:120px;
}

.gridOpen{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:15px;
min-height:120px;
}

.gridClosed{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:15px;
min-height:120px;
}

/* 카드 */

.partyCard{
border:1px solid #ccc;
border-radius:6px;
padding:12px;
background:#f8f8f8;

display:flex;
flex-direction:column;
justify-content:space-between;

min-height:170px;
}

.myParty{
border:3px solid #4CAF50;
background:#eef9ee;
}

.status{
font-weight:bold;
margin:5px 0;
}

.openStatus{color:green;}
.closedStatus{color:red;}

.members{
font-size:13px;
color:#444;
margin-top:4px;
}

/* 버튼 줄 */

.cardButtons{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:5px;
margin-top:8px;
}

.empty{
color:#888;
margin-top:20px;
}

/* 모바일 */

@media (max-width:900px){

.layout{
flex-direction:column;
gap:40px;
}

.column{
height:auto;
}

.scroll{
overflow-y:visible;
}

.gridOpen{
grid-template-columns:repeat(2,1fr);
}

.gridClosed{
grid-template-columns:1fr;
}

.partyCard{
font-size:16px;
padding:16px;
}

button{
font-size:14px;
padding:10px 12px;
}

#login input{
width:80%;
max-width:320px;
font-size:18px;
padding:12px;
}

#login button{
width:60%;
max-width:200px;
font-size:18px;
padding:12px;
}

.topbar{
position:static;
margin-bottom:10px;
display:flex;
justify-content:flex-end;
font-size:13px;
}

}

</style>

</head>

<body>

<div id="login">

<h2>970KOR 로그인</h2>

<input id="nickname" placeholder="닉네임" autofocus>

<button onclick="login()">로그인</button>

</div>

<div id="main">

<div class="topbar">

<span id="userLabel"></span>

<button onclick="logout()">로그아웃</button>

</div>

<h1>970KOR 바이킹의 역습</h1>

<h3>파티 생성</h3>

<input id="partyName" placeholder="파티 이름">

<select id="limit">
<option value="2">2명</option>
<option value="3">3명</option>
<option value="4">4명</option>
<option value="5">5명</option>
<option value="6">6명</option>
</select>

<button onclick="createParty()">파티 생성</button>

<div id="adminPanel" class="adminPanel"></div>

<div class="layout">

<div class="column my">

<h2>⭐ 나의 파티</h2>

<div class="scroll">
<div id="myParty" class="gridMy"></div>
</div>

</div>

<div class="column open">

<h2>🟢 모집중</h2>

<div class="scroll">
<div id="openParty" class="gridOpen"></div>
</div>

</div>

<div class="column closed">

<h2>🔴 모집완료</h2>

<div class="scroll">
<div id="closedParty" class="gridClosed"></div>
</div>

</div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
doc,
getDoc,
getDocs,
setDoc,
updateDoc,
deleteDoc,
onSnapshot
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig={
apiKey:"AIzaSyBu2RrQn8cAwwWaLtw5O8Omwn4-NzHWuc0",
authDomain:"kor-app-fa47e.firebaseapp.com",
projectId:"kor-app-fa47e",
storageBucket:"kor-app-fa47e.firebasestorage.app",
messagingSenderId:"397749083935",
appId:"1:397749083935:web:b2bd8498b943aec5099a2a"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

let nickname="";
const admin="병풍";

/* 자동 로그인 */

window.onload=function(){

const saved=localStorage.getItem("nickname");

if(saved){
nickname=saved;
showMain();
}

};

/* 로그인 */

window.login=async function(){

const name=document.getElementById("nickname").value;

if(!name){
alert("닉네임 입력");
return;
}

const ref=doc(db,"users",name);

const snap=await getDoc(ref);

if(snap.exists()){
alert("이미 사용중인 닉네임");
return;
}

await setDoc(ref,{createdAt:Date.now()});

nickname=name;

localStorage.setItem("nickname",nickname);

showMain();

};

/* 메인 */

function showMain(){

document.getElementById("login").style.display="none";
document.getElementById("main").style.display="block";

document.getElementById("userLabel").innerText="👤 "+nickname;

/* 관리자 버튼 */

if(nickname===admin){

document.getElementById("adminPanel").innerHTML=`

<button onclick="deleteAllParties()">전체 파티 삭제</button>
<button onclick="resetDatabase()">DB 초기화</button>

`;

}

}

/* 로그아웃 */

window.logout=async function(){

await deleteDoc(doc(db,"users",nickname));

localStorage.removeItem("nickname");

location.reload();

};

/* 파티 생성 */

window.createParty=async function(){

const name=document.getElementById("partyName").value;
const limit=parseInt(document.getElementById("limit").value);

if(!name){
alert("파티 이름 입력");
return;
}

const snapshot=await getDocs(collection(db,"parties"));

let blocked=false;

snapshot.forEach(p=>{
let d=p.data();
if(d.leader===nickname) blocked=true;
if(d.members.includes(nickname)) blocked=true;
});

if(blocked){
alert("이미 파티에 참여중입니다.");
return;
}

await addDoc(collection(db,"parties"),{
name:name,
leader:nickname,
members:[nickname],
limit:limit,
createdAt:Date.now()
});

};

/* 관리자 기능 */

window.deleteAllParties=async function(){

if(!confirm("모든 파티 삭제?")) return;

const snapshot=await getDocs(collection(db,"parties"));

snapshot.forEach(async p=>{
await deleteDoc(doc(db,"parties",p.id));
});

};

window.resetDatabase=async function(){

if(!confirm("DB 초기화?")) return;

const parties=await getDocs(collection(db,"parties"));

parties.forEach(async p=>{
await deleteDoc(doc(db,"parties",p.id));
});

};

/* 파티 표시 */

const myGrid=document.getElementById("myParty");
const openGrid=document.getElementById("openParty");
const closedGrid=document.getElementById("closedParty");

onSnapshot(collection(db,"parties"),snapshot=>{

myGrid.innerHTML="";
openGrid.innerHTML="";
closedGrid.innerHTML="";

snapshot.forEach(docSnap=>{

const data=docSnap.data();
const members=data.members||[];

const isFull=members.length>=data.limit;

const card=document.createElement("div");
card.className="partyCard";

if(members.includes(nickname)){
card.classList.add("myParty");
}

const status=isFull
? `<div class="status closedStatus">🔴 모집완료</div>`
: `<div class="status openStatus">🟢 모집중</div>`;

let deleteButton="";

if(data.leader===nickname || nickname===admin){
deleteButton=`<button onclick="deleteParty('${docSnap.id}')">삭제</button>`;
}

card.innerHTML=`

<div>

<b>${data.name}</b>

<br>파티장 : ${data.leader}

${status}

<br>${members.length}/${data.limit}

<div class="members">
${members.join(", ")}
</div>

</div>

<div class="cardButtons">

${!isFull ? `<button onclick="joinParty('${docSnap.id}')">지원</button>` : ""}

<button onclick="leaveParty('${docSnap.id}')">취소</button>

${deleteButton}

</div>

`;

if(members.includes(nickname)){
myGrid.appendChild(card);
}
else if(isFull){
closedGrid.appendChild(card);
}
else{
openGrid.appendChild(card);
}

});

});

/* 참가 */

window.joinParty=async function(id){

const snapshot=await getDocs(collection(db,"parties"));

let already=false;

snapshot.forEach(p=>{
if(p.data().members.includes(nickname)){
already=true;
}
});

if(already){
alert("이미 다른 파티 참여중");
return;
}

const ref=doc(db,"parties",id);

const snap=await getDoc(ref);

let data=snap.data();

if(data.members.length>=data.limit){
alert("정원 초과");
return;
}

data.members.push(nickname);

await updateDoc(ref,{members:data.members});

};

/* 탈퇴 */

window.leaveParty=async function(id){

const ref=doc(db,"parties",id);

const snap=await getDoc(ref);

let members=snap.data().members;

members=members.filter(m=>m!==nickname);

await updateDoc(ref,{members});

};

/* 삭제 */

window.deleteParty=async function(id){

if(confirm("파티 삭제?")){
await deleteDoc(doc(db,"parties",id));
}

};

</script>

</body>

</html>
