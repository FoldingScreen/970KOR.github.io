<!DOCTYPE html>

<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>970KOR 바이킹의 역습</title>

<style>

body{
font-family:sans-serif;
margin:20px;
text-align:center;
}

#login{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
height:100vh;
}

#login input{
width:260px;
padding:10px;
margin:10px;
font-size:16px;
}

#main{
display:none;
}

.topbar{
position:fixed;
top:15px;
right:20px;
background:white;
padding:6px 12px;
border-radius:6px;
box-shadow:0 0 5px rgba(0,0,0,0.1);
}

button{
border:1px solid #aaa;
background:#f3f3f3;
border-radius:4px;
padding:6px 10px;
cursor:pointer;
}

.layout{
display:flex;
gap:30px;
margin-top:30px;
}

.column{
display:flex;
flex-direction:column;
height:650px;
}

.column.my{flex:1;}
.column.open{flex:4;}
.column.closed{flex:2;}

.scroll{
flex:1;
overflow-y:auto;
}

.gridMy{display:grid;gap:12px;}
.gridOpen{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
.gridClosed{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}

.partyCard{
border:1px solid #ccc;
border-radius:6px;
background:#f8f8f8;
padding:12px;

display:flex;
flex-direction:column;
justify-content:space-between;

min-height:170px;
}

.myParty{
border:3px solid #4CAF50;
background:#eef9ee;
}

.members div{
display:flex;
justify-content:space-between;
}

.cardButtons{
display:flex;
justify-content:center;
gap:5px;
margin-top:10px;
flex-wrap:wrap;
}

.openStatus{color:green;}
.closedStatus{color:red;}

@media (max-width:900px){

.layout{
flex-direction:column;
}

.column{
height:auto;
}

.scroll{
overflow-y:visible;
}

.gridOpen{
grid-template-columns:repeat(2,1fr);
}

.gridClosed{
grid-template-columns:1fr;
}

.topbar{
position:static;
margin-bottom:10px;
display:flex;
justify-content:flex-end;
}

}

</style>

</head>

<body>

<div id="login">

<h2>970KOR 로그인</h2>

<input id="nickname" placeholder="닉네임" autofocus>

<button onclick="login()">로그인</button>

</div>

<div id="main">

<div class="topbar">

<span id="userLabel"></span>

<button onclick="logout()">로그아웃</button>

</div>

<h1>970KOR 바이킹의 역습</h1>

<input id="partyName" placeholder="파티 이름">

<select id="limit">
<option value="2">2</option>
<option value="3">3</option>
<option value="4">4</option>
<option value="5">5</option>
<option value="6">6</option>
</select>

<button onclick="createParty()">파티 생성</button>

<div class="layout">

<div class="column my">

<h3>⭐ 나의 파티</h3>

<div class="scroll">
<div id="myParty" class="gridMy"></div>
</div>

</div>

<div class="column open">

<h3>🟢 모집중</h3>

<div class="scroll">
<div id="openParty" class="gridOpen"></div>
</div>

</div>

<div class="column closed">

<h3>🔴 모집완료</h3>

<div class="scroll">
<div id="closedParty" class="gridClosed"></div>
</div>

</div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
doc,
getDoc,
getDocs,
setDoc,
updateDoc,
deleteDoc,
onSnapshot
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig={
apiKey:"AIzaSyBu2RrQn8cAwwWaLtw5O8Omwn4-NzHWuc0",
authDomain:"kor-app-fa47e.firebaseapp.com",
projectId:"kor-app-fa47e",
storageBucket:"kor-app-fa47e.firebasestorage.app",
messagingSenderId:"397749083935",
appId:"1:397749083935:web:b2bd8498b943aec5099a2a"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

let nickname="";

function isAdmin(){
return nickname==="병풍";
}

window.login=async function(){

const name=document.getElementById("nickname").value;

const ref=doc(db,"users",name);

const snap=await getDoc(ref);

if(snap.exists()){
alert("이미 사용중 닉네임");
return;
}

await setDoc(ref,{});

nickname=name;

localStorage.setItem("nickname",nickname);

showMain();

startRealtime();

};

function showMain(){

document.getElementById("login").style.display="none";
document.getElementById("main").style.display="block";

document.getElementById("userLabel").innerText="👤 "+nickname;

}

window.logout=async function(){

await deleteDoc(doc(db,"users",nickname));

localStorage.removeItem("nickname");

location.reload();

};

window.createParty=async function(){

const name=document.getElementById("partyName").value;
const limit=parseInt(document.getElementById("limit").value);

const snap=await getDocs(collection(db,"parties"));

let blocked=false;

snap.forEach(p=>{
let d=p.data();
if(d.leader===nickname) blocked=true;
if(d.members.includes(nickname)) blocked=true;
});

if(blocked){
alert("이미 파티 참여중");
return;
}

await addDoc(collection(db,"parties"),{
name:name,
leader:nickname,
members:[nickname],
limit:limit
});

};

function startRealtime(){

onSnapshot(collection(db,"parties"),snapshot=>{
render(snapshot);
});

}

function render(snapshot){

const myGrid=document.getElementById("myParty");
const openGrid=document.getElementById("openParty");
const closedGrid=document.getElementById("closedParty");

myGrid.innerHTML="";
openGrid.innerHTML="";
closedGrid.innerHTML="";

snapshot.forEach(docSnap=>{

const data=docSnap.data();
const members=data.members;
const isFull=members.length>=data.limit;

const card=document.createElement("div");
card.className="partyCard";

if(members.includes(nickname)){
card.classList.add("myParty");
}

const membersHTML=members.map(m=>{

let display=m;

if(m===nickname){
display="⭐ "+m;
}

let kick="";

if((data.leader===nickname || isAdmin()) && m!==data.leader){
kick=`<button onclick="kickMember('${docSnap.id}','${m}')">❌</button>`;
}

return `<div>${display} ${kick}</div>`;

}).join("");

let buttons="";

if(data.leader===nickname){

buttons=`<button onclick="deleteParty('${docSnap.id}')">삭제</button>`;

}
else if(members.includes(nickname)){

buttons=`<button onclick="leaveParty('${docSnap.id}')">지원취소</button>`;

}
else{

if(!isFull){
buttons=`<button onclick="joinParty('${docSnap.id}')">지원</button>`;
}

}

if(isAdmin() && data.leader!==nickname){
buttons+=` <button onclick="deleteParty('${docSnap.id}')">삭제</button>`;
}

card.innerHTML=`

<div>

<b>${data.name}</b>

<br>파티장 : ${data.leader}

<div class="${isFull?'closedStatus':'openStatus'}">

${isFull?'🔴 모집완료':'🟢 모집중'}

</div>

${members.length}/${data.limit}

<div class="members">
${membersHTML}
</div>

</div>

<div class="cardButtons">

${buttons}

</div>

`;

if(members.includes(nickname)){
myGrid.appendChild(card);
}
else if(isFull){
closedGrid.appendChild(card);
}
else{
openGrid.appendChild(card);
}

});

}

window.joinParty=async function(id){

const snap=await getDocs(collection(db,"parties"));

let already=false;

snap.forEach(p=>{
if(p.data().members.includes(nickname)){
already=true;
}
});

if(already){
alert("이미 다른 파티 참여중");
return;
}

const ref=doc(db,"parties",id);

const docSnap=await getDoc(ref);

let data=docSnap.data();

data.members.push(nickname);

await updateDoc(ref,{members:data.members});

};

window.leaveParty=async function(id){

if(!confirm("파티 지원을 취소하시겠습니까?")) return;

const ref=doc(db,"parties",id);

const snap=await getDoc(ref);

let members=snap.data().members.filter(m=>m!==nickname);

await updateDoc(ref,{members});

};

window.kickMember=async function(id,member){

if(!confirm(member+" 님을 파티에서 내보내시겠습니까?")) return;

const ref=doc(db,"parties",id);

const snap=await getDoc(ref);

let data=snap.data();

let members=data.members.filter(m=>m!==member);

await updateDoc(ref,{members});

};

window.deleteParty=async function(id){

if(!confirm("이 파티를 삭제하시겠습니까?")) return;

await deleteDoc(doc(db,"parties",id));

};

</script>

</body>

</html>
