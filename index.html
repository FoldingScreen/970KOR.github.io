<!DOCTYPE html>

<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>970KOR 바이킹</title>

<style>

body{
font-family:sans-serif;
margin:20px;
text-align:center;
}

/* 로그인 */

#login{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
height:100vh;
}

/* 상단 */

.topbar{
position:fixed;
top:15px;
right:20px;
}

.dropdown{
display:inline-block;
position:relative;
}

.dropdownContent{
display:none;
position:absolute;
background:white;
border:1px solid #ccc;
right:0;
}

.dropdownContent button{
display:block;
width:150px;
}

.dropdown:hover .dropdownContent{
display:block;
}

/* 대시보드 */

#dashboard{
margin-top:10px;
font-size:14px;
}

/* 카드 */

.partyCard{
border-radius:6px;
padding:12px;
min-height:170px;
display:flex;
flex-direction:column;
justify-content:space-between;
}

.cardMy{
background:#fff3b0;
}

.cardOpen{
background:#e8f8e8;
}

.cardClosed{
background:#eeeeee;
}

/* 버튼 */

.btnJoin{
background:#4CAF50;
color:white;
}

.btnLeave{
background:#777;
color:white;
}

.btnDelete{
background:#e74c3c;
color:white;
}

/* 레이아웃 */

.layout{
display:flex;
gap:30px;
margin-top:30px;
}

.column{
flex:1;
}

.gridOpen{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:12px;
}

.gridClosed{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:12px;
}

.gridMy{
display:grid;
gap:12px;
}

/* 모달 */

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.4);
}

.modalContent{
background:white;
padding:20px;
width:350px;
margin:100px auto;
max-height:70%;
overflow:auto;
}

.userJoin{color:green;}
.userNot{color:#333;}

</style>

</head>

<body>

<div id="login">

<h2>970KOR 로그인</h2>

<input id="nickname" placeholder="닉네임">
<button onclick="login()">로그인</button>

</div>

<div id="main" style="display:none">

<div class="topbar">

<span id="userLabel"></span>

<span id="adminMenu"></span>

<button onclick="logout()">로그아웃</button>

</div>

<h1>970KOR 바이킹</h1>

<div id="dashboard"></div>

<button onclick="showUsers()">전체목록</button>

<br><br>

<input id="partyName" placeholder="파티 이름">

<select id="limit">
<option>2</option>
<option>3</option>
<option>4</option>
<option>5</option>
<option>6</option>
</select>

<button onclick="createParty()">파티 생성</button>

<div class="layout">

<div class="column">

<h3>⭐ 나의 파티</h3>
<div id="myParty" class="gridMy"></div>

</div>

<div class="column">

<h3 id="openTitle">🟢 모집중</h3>
<div id="openParty" class="gridOpen"></div>

</div>

<div class="column">

<h3 id="closedTitle">🔴 모집완료</h3>
<div id="closedParty" class="gridClosed"></div>

</div>

</div>

</div>

<!-- 사용자 목록 모달 -->

<div id="userModal" class="modal">
<div class="modalContent">

<h3>전체 사용자</h3>

<div id="userList"></div>

<br>

<button onclick="closeUsers()">닫기</button>

</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
doc,
getDoc,
getDocs,
setDoc,
updateDoc,
deleteDoc,
onSnapshot
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig={
apiKey:"AIzaSyBu2RrQn8cAwwWaLtw5O8Omwn4-NzHWuc0",
authDomain:"kor-app-fa47e.firebaseapp.com",
projectId:"kor-app-fa47e",
storageBucket:"kor-app-fa47e.firebasestorage.app",
messagingSenderId:"397749083935",
appId:"1:397749083935:web:b2bd8498b943aec5099a2a"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

let nickname="";
let admins=[];
let allUsers=[];
let partyUsers=[];

function isAdmin(){
return nickname==="병풍" || admins.includes(nickname);
}

/* 로그인 */

window.login=async function(){

const name=document.getElementById("nickname").value;

const ref=doc(db,"users",name);

const snap=await getDoc(ref);

if(!snap.exists()){
await setDoc(ref,{created:Date.now()});
}

nickname=name;

localStorage.setItem("nickname",nickname);

showMain();

startRealtime();

};

/* 메인 */

function showMain(){

document.getElementById("login").style.display="none";
document.getElementById("main").style.display="block";

document.getElementById("userLabel").innerText="👤 "+nickname;

if(nickname==="병풍"){
document.getElementById("adminMenu").innerHTML=

`<div class="dropdown">
<button>운영 ▼</button>
<div class="dropdownContent">

<button onclick="resetParties()">전체 파티 초기화</button>
<button onclick="addAdmin()">운영진 지정</button>
<button onclick="forceKick()">강제 탈퇴</button>

</div>
</div>`;
}

}

/* 로그아웃 */

window.logout=function(){

localStorage.removeItem("nickname");
location.reload();

};

/* 파티 생성 */

window.createParty=async function(){

const name=document.getElementById("partyName").value;
const limit=parseInt(document.getElementById("limit").value);

const snap=await getDocs(collection(db,"parties"));

let blocked=false;

snap.forEach(p=>{
let d=p.data();
if(d.leader===nickname) blocked=true;
if(d.members.includes(nickname)) blocked=true;
});

if(blocked){
alert("이미 파티 참여중");
return;
}

await addDoc(collection(db,"parties"),{
name:name,
leader:nickname,
members:[nickname],
limit:limit,
created:Date.now()
});

};

/* 실시간 */

async function startRealtime(){

const usersSnap=await getDocs(collection(db,"users"));

allUsers=[];

usersSnap.forEach(u=>{

if(!u.id.startsWith("테스트")){
allUsers.push(u.id);
}

});

onSnapshot(collection(db,"parties"),snapshot=>{
render(snapshot);
});

}

/* 렌더 */

function render(snapshot){

const myGrid=document.getElementById("myParty");
const openGrid=document.getElementById("openParty");
const closedGrid=document.getElementById("closedParty");

myGrid.innerHTML="";
openGrid.innerHTML="";
closedGrid.innerHTML="";

let totalUsers=new Set();
let openCount=0;
let closedCount=0;

snapshot.forEach(docSnap=>{

const data=docSnap.data();
const members=data.members;

const isFull=members.length>=data.limit;

members.forEach(m=>{

if(!m.startsWith("테스트")){
totalUsers.add(m);
}

});

if(isFull) closedCount++;
else openCount++;

});

partyUsers=[...totalUsers];

const notJoin=allUsers.filter(u=>!partyUsers.includes(u));

document.getElementById("dashboard").innerHTML=

"총 인원 "+allUsers.length+
" | 참여 "+partyUsers.length+
" | 미참여 "+notJoin.length;

document.getElementById("openTitle").innerText="🟢 모집중 ("+openCount+")";
document.getElementById("closedTitle").innerText="🔴 모집완료 ("+closedCount+")";

}

/* 전체 목록 */

window.showUsers=function(){

const modal=document.getElementById("userModal");
const list=document.getElementById("userList");

list.innerHTML="";

allUsers.forEach(u=>{

let cls=partyUsers.includes(u)?"userJoin":"userNot";

list.innerHTML+=`<div class="${cls}">${u}</div>`;

});

modal.style.display="block";

}

window.closeUsers=function(){
document.getElementById("userModal").style.display="none";
}

/* 운영 기능 */

window.resetParties=async function(){

if(!confirm("전체 파티 초기화하시겠습니까?")) return;

const snap=await getDocs(collection(db,"parties"));

snap.forEach(async p=>{
await deleteDoc(doc(db,"parties",p.id));
});

}

window.addAdmin=async function(){

let name=prompt("운영진 닉네임");

if(!name) return;

await setDoc(doc(db,"admins",name),{});

alert("운영진 지정 완료");

}

window.forceKick=async function(){

let name=prompt("강제 탈퇴 닉네임");

if(!name) return;

if(!confirm("정말 탈퇴 처리하시겠습니까?")) return;

await deleteDoc(doc(db,"users",name));

alert("탈퇴 처리 완료");

}

</script>

</body>

</html>
