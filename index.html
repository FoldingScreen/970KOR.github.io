<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>970KOR 이벤트 매칭</title>

  <link rel="stylesheet" href="style.css" />

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
</head>
<body>
  <!-- 로그인 -->
  <div id="loginPage" class="loginPage">
    <div class="loginCard">
      <div class="loginLogo">970KOR</div>
      <h1 class="loginTitle">이벤트 매칭</h1>
      <p class="loginDesc">닉네임으로 입장하세요.</p>

      <input id="nicknameInput" class="textInput" placeholder="닉네임 입력" autocomplete="off" />
      <button class="primaryBtn loginBtn" onclick="login()">입장</button>
    </div>
  </div>

  <!-- 앱 -->
  <div id="appShell" class="appShell" style="display:none;">
    <!-- 상단 바 -->
    <header class="topbar">
      <div class="topbarLeft">
        <div class="brand">970KOR</div>

        <nav class="topTabs">
          <button id="homeTabBtn" class="topTab" onclick="goHome()">홈</button>
          <div id="eventTabs" class="eventTabs"></div>
        </nav>
      </div>

      <div class="topbarRight">
        <span id="myNickname" class="nicknameBadge"></span>
        <button id="adminMenuBtn" class="ghostBtn" style="display:none;" onclick="openAdminModal()">운영진 메뉴</button>
        <button class="ghostBtn" onclick="logout()">로그아웃</button>
      </div>
    </header>

    <main class="mainArea">
      <!-- 홈 -->
      <section id="homeView" class="homeView">
        <div class="heroCard">
          <div class="heroTitle">970KOR 이벤트 로비</div>
          <div class="heroDesc">
            상단 탭에서 이벤트를 선택하면 해당 이벤트의 파티 모집 현황을 바로 확인할 수 있습니다.
          </div>
        </div>

        <div id="homeStats" class="homeStats"></div>

        <div class="homeSectionTitle">이벤트 바로가기</div>
        <div id="homeEventCards" class="homeEventCards"></div>
      </section>

      <!-- 이벤트 -->
      <section id="eventView" class="eventView" style="display:none;">
        <div class="eventHeader">
          <h1 id="eventTitle" class="eventTitle"></h1>

          <div class="eventSubRow">
            <div id="dashboard" class="dashboard"></div>
            <button class="secondaryBtn" onclick="showUsers()">참여자 보기</button>
          </div>
        </div>

        <section class="createBox">
          <div class="createBoxTop">
            <div class="createTitle">파티 생성</div>
            <div id="createHint" class="createHint"></div>
          </div>

          <div class="createGrid">
            <div class="fieldItem">
              <label id="titleLabel" for="partyTitleInput">파티명</label>
              <input id="partyTitleInput" class="textInput" placeholder="파티명을 입력하세요" autocomplete="off" />
            </div>

            <div id="timeFieldWrap" class="timeFieldWrap" style="display:none;">
              <div class="fieldItem">
                <label for="timeKSTInput">시간(KST)</label>
                <input id="timeKSTInput" class="textInput" placeholder="예: 21:00" autocomplete="off" />
              </div>

              <div class="fieldItem">
                <label for="timeUTCInput">시간(UTC)</label>
                <input id="timeUTCInput" class="textInput" placeholder="예: 12:00" autocomplete="off" />
              </div>
            </div>

            <div class="fieldItem fieldLimit">
              <label for="partyLimitInput">총원</label>
              <input id="partyLimitInput" class="textInput" type="number" min="1" value="6" />
            </div>

            <div class="fieldItem fieldButton">
              <label>&nbsp;</label>
              <button id="createPartyBtn" class="primaryBtn" onclick="createParty()">파티 생성</button>
            </div>
          </div>
        </section>

        <section class="boardGrid">
          <div class="boardColumn">
            <div class="boardTitle">나의 파티</div>
            <div id="myParty" class="cardGrid"></div>
          </div>

          <div class="boardColumn">
            <div class="boardTitle">모집중</div>
            <div id="openParty" class="cardGrid"></div>
          </div>

          <div class="boardColumn">
            <div class="boardTitle">모집완료</div>
            <div id="closedParty" class="cardGrid"></div>
          </div>
        </section>
      </section>
    </main>
  </div>

  <!-- 참여자 모달 -->
  <div id="userModal" class="modal" style="display:none;">
    <div class="modalPanel">
      <div class="modalHeader">
        <div class="modalTitle">현재 이벤트 참여자 현황</div>
        <button class="ghostBtn" onclick="closeUsers()">닫기</button>
      </div>
      <div id="userList" class="userList"></div>
    </div>
  </div>

  <!-- 운영진 모달 -->
  <div id="adminModal" class="modal" style="display:none;">
    <div class="modalPanel">
      <div class="modalHeader">
        <div class="modalTitle">운영진 메뉴</div>
        <button class="ghostBtn" onclick="closeAdminModal()">닫기</button>
      </div>

      <div class="adminInfo">
        <div><b>현재 사용자:</b> <span id="adminInfoNickname"></span></div>
        <div><b>현재 이벤트:</b> <span id="adminInfoEvent"></span></div>
        <div><b>생성 권한:</b> <span id="adminInfoCreateRole"></span></div>
        <div><b>카드 유형:</b> <span id="adminInfoTemplate"></span></div>
      </div>

      <div class="adminActions">
        <button class="secondaryBtn" onclick="refreshBaseData()">기본 데이터 새로고침</button>
      </div>
    </div>
  </div>

  <script src="script.js?v=7"></script>
</body>
</html>
