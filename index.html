<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>970KOR 이벤트</title>

<link rel="stylesheet" href="style.css">

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

</head>

<body>

<div id="loginPage">

<h2>970KOR 로그인</h2>

<input id="nicknameInput" placeholder="닉네임" onkeypress="enterLogin(event)">
<button onclick="login()">로그인</button>

</div>


<div id="eventPage" style="display:none">

<h2>이벤트 선택</h2>

<button onclick="selectEvent('viking')">
바이킹의 역습
</button>

<button onclick="selectEvent('relic')">
유적 쟁탈
</button>

</div>


<div id="mainPage" style="display:none">

<div class="topbar">

<span id="userLabel"></span>
<button onclick="logout()">로그아웃</button>

</div>

<h1 id="eventTitle"></h1>

<div id="partyContainer"></div>

</div>

<script src="script.js"></script>

</body>
</html>
