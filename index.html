<!DOCTYPE html>

<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>970KOR 바이킹의 역습</title>

<style>

body{
font-family:sans-serif;
margin:20px;
text-align:center;
}

#login{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
height:100vh;
}

#login input{
width:260px;
padding:10px;
margin:10px;
font-size:16px;
}

#main{
display:none;
}

/* 상단 */

.topbar{
position:fixed;
top:15px;
right:20px;
background:white;
padding:6px 12px;
border-radius:6px;
box-shadow:0 0 5px rgba(0,0,0,0.1);
}

/* 대시보드 */

#dashboard{
margin-top:10px;
font-size:14px;
}

#userListBtn{
font-size:12px;
padding:4px 8px;
margin-left:10px;
}

/* 모달 */

#userModal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.4);
}

.modalContent{
background:white;
width:320px;
max-height:70%;
overflow:auto;
margin:80px auto;
padding:20px;
border-radius:8px;
}

.userJoin{
color:green;
}

.userNot{
color:#444;
}

/* 버튼 */

button{
border:1px solid #aaa;
border-radius:4px;
padding:6px 10px;
cursor:pointer;
}

.btnJoin{
background:#4CAF50;
color:white;
border:none;
}

.btnLeave{
background:#777;
color:white;
border:none;
}

.btnDelete{
background:#e74c3c;
color:white;
border:none;
}

/* 레이아웃 */

.layout{
display:flex;
gap:30px;
margin-top:30px;
}

.column{
display:flex;
flex-direction:column;
height:650px;
}

.column.my{flex:1;}
.column.open{flex:4;}
.column.closed{flex:2;}

.scroll{
flex:1;
overflow-y:auto;
}

.gridMy{display:grid;gap:12px;}
.gridOpen{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
.gridClosed{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}

/* 카드 */

.partyCard{
border:1px solid #ccc;
border-radius:6px;
padding:12px;
display:flex;
flex-direction:column;
justify-content:space-between;
min-height:170px;
}

.cardMy{
background:#e8f8e8;
border:2px solid #4CAF50;
}

.cardOpen{
background:white;
}

.cardClosed{
background:#eeeeee;
}

/* 멤버 */

.members div{
display:flex;
justify-content:space-between;
}

.time{
font-size:11px;
color:#888;
margin-top:3px;
}

.cardButtons{
display:flex;
justify-content:center;
gap:5px;
margin-top:10px;
flex-wrap:wrap;
}

/* 모바일 */

@media (max-width:900px){

.layout{
flex-direction:column;
}

.column{
height:auto;
}

.scroll{
overflow-y:visible;
}

.gridOpen{
grid-template-columns:repeat(2,1fr);
}

.gridClosed{
grid-template-columns:1fr;
}

.topbar{
position:static;
margin-bottom:10px;
display:flex;
justify-content:flex-end;
}

}

</style>

</head>

<body>

<div id="login">

<h2>970KOR 로그인</h2>

<input id="nickname" placeholder="닉네임" autofocus>

<button onclick="login()">로그인</button>

</div>

<div id="main">

<div class="topbar">

<span id="userLabel"></span>

<button onclick="logout()">로그아웃</button>

</div>

<h1>970KOR 바이킹의 역습</h1>

<div id="dashboard"></div>

<br>

<input id="partyName" placeholder="파티 이름">

<select id="limit">
<option value="2">2</option>
<option value="3">3</option>
<option value="4">4</option>
<option value="5">5</option>
<option value="6">6</option>
</select>

<button onclick="createParty()">파티 생성</button>

<div class="layout">

<div class="column my">

<h3>⭐ 나의 파티</h3>

<div class="scroll">
<div id="myParty" class="gridMy"></div>
</div>

</div>

<div class="column open">

<h3 id="openTitle">모집중</h3>

<div class="scroll">
<div id="openParty" class="gridOpen"></div>
</div>

</div>

<div class="column closed">

<h3 id="closedTitle">모집완료</h3>

<div class="scroll">
<div id="closedParty" class="gridClosed"></div>
</div>

</div>

</div>

</div>

<!-- 모달 -->

<div id="userModal">

<div class="modalContent">

<h3>전체 인원</h3>

<div id="userList"></div>

<br>

<button onclick="closeUsers()">닫기</button>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
doc,
getDoc,
getDocs,
setDoc,
updateDoc,
deleteDoc,
onSnapshot
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig={
apiKey:"AIzaSyBu2RrQn8cAwwWaLtw5O8Omwn4-NzHWuc0",
authDomain:"kor-app-fa47e.firebaseapp.com",
projectId:"kor-app-fa47e",
storageBucket:"kor-app-fa47e.firebasestorage.app",
messagingSenderId:"397749083935",
appId:"1:397749083935:web:b2bd8498b943aec5099a2a"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

let nickname="";
let allUsers=[];
let partyUsers=[];

function isAdmin(){
return nickname==="병풍";
}

window.login=async function(){

const name=document.getElementById("nickname").value;

const ref=doc(db,"users",name);

const snap=await getDoc(ref);

if(!snap.exists()){
await setDoc(ref,{created:Date.now()});
}

nickname=name;

localStorage.setItem("nickname",nickname);

showMain();

startRealtime();

};

function showMain(){

document.getElementById("login").style.display="none";
document.getElementById("main").style.display="block";

document.getElementById("userLabel").innerText="👤 "+nickname;

}

window.logout=function(){

localStorage.removeItem("nickname");
location.reload();

};

window.createParty=async function(){

const name=document.getElementById("partyName").value;
const limit=parseInt(document.getElementById("limit").value);

const snap=await getDocs(collection(db,"parties"));

let blocked=false;

snap.forEach(p=>{
let d=p.data();
if(d.leader===nickname) blocked=true;
if(d.members.includes(nickname)) blocked=true;
});

if(blocked){
alert("이미 파티 참여중");
return;
}

await addDoc(collection(db,"parties"),{
name:name,
leader:nickname,
members:[nickname],
limit:limit,
created:Date.now()
});

};

async function startRealtime(){

const usersSnap=await getDocs(collection(db,"users"));

allUsers=[];

usersSnap.forEach(u=>{
allUsers.push(u.id);
});

onSnapshot(collection(db,"parties"),snapshot=>{
render(snapshot);
});

}

function render(snapshot){

const myGrid=document.getElementById("myParty");
const openGrid=document.getElementById("openParty");
const closedGrid=document.getElementById("closedParty");

myGrid.innerHTML="";
openGrid.innerHTML="";
closedGrid.innerHTML="";

let totalUsers=new Set();
let openCount=0;
let closedCount=0;

snapshot.forEach(docSnap=>{

const data=docSnap.data();
const members=data.members;
const isFull=members.length>=data.limit;

members.forEach(m=>totalUsers.add(m));

if(isFull) closedCount++;
else openCount++;

const card=document.createElement("div");

let cardClass="partyCard";

if(members.includes(nickname)){
cardClass+=" cardMy";
}
else if(isFull){
cardClass+=" cardClosed";
}
else{
cardClass+=" cardOpen";
}

card.className=cardClass;

const date=new Date(data.created);

const timeText=
(date.getMonth()+1)+"/"+
date.getDate()+" "+
date.getHours()+":"+
String(date.getMinutes()).padStart(2,"0");

const membersHTML=members.map(m=>{

let name=m;

if(m===nickname){
name="⭐ "+m;
}

if(m===data.leader){
name="👑 "+name;
}

let kick="";

if((data.leader===nickname || isAdmin()) && m!==data.leader){
kick=`<button onclick="kickMember('${docSnap.id}','${m}')">❌</button>`;
}

return `<div>${name} ${kick}</div>`;

}).join("");

let buttons="";

if(data.leader===nickname){

buttons=`<button class="btnDelete" onclick="deleteParty('${docSnap.id}')">삭제</button>`;

}
else if(members.includes(nickname)){

buttons=`<button class="btnLeave" onclick="leaveParty('${docSnap.id}')">지원취소</button>`;

}
else{

if(!isFull){
buttons=`<button class="btnJoin" onclick="joinParty('${docSnap.id}')">지원</button>`;
}

}

if(isAdmin() && data.leader!==nickname){
buttons+=` <button class="btnDelete" onclick="deleteParty('${docSnap.id}')">삭제</button>`;
}

card.innerHTML=`

<div>

<b>${data.name}</b>

<div class="time">
${timeText}
</div>

<br>

${members.length}/${data.limit}

<div class="members">
${membersHTML}
</div>

</div>

<div class="cardButtons">

${buttons}

</div>

`;

if(members.includes(nickname)){
myGrid.appendChild(card);
}
else if(isFull){
closedGrid.appendChild(card);
}
else{
openGrid.appendChild(card);
}

});

partyUsers=[...totalUsers];

const notJoin=allUsers.filter(u=>!partyUsers.includes(u));

document.getElementById("dashboard").innerHTML=
"총 인원 "+allUsers.length+
" | 참여 "+partyUsers.length+
" | 미참여 "+notJoin.length+
" <button id='userListBtn' onclick='showUsers()'>전체목록</button>";

document.getElementById("openTitle").innerText="모집중 ("+openCount+")";
document.getElementById("closedTitle").innerText="모집완료 ("+closedCount+")";

}

window.showUsers=function(){

const modal=document.getElementById("userModal");
const list=document.getElementById("userList");

list.innerHTML="";

allUsers.forEach(u=>{

let cls=partyUsers.includes(u)?"userJoin":"userNot";

list.innerHTML+=`<div class="${cls}">${u}</div>`;

});

modal.style.display="block";

}

window.closeUsers=function(){

document.getElementById("userModal").style.display="none";

}

window.joinParty=async function(id){

const snap=await getDocs(collection(db,"parties"));

let already=false;

snap.forEach(p=>{
if(p.data().members.includes(nickname)){
already=true;
}
});

if(already){
alert("이미 다른 파티 참여중");
return;
}

const ref=doc(db,"parties",id);

const docSnap=await getDoc(ref);

let data=docSnap.data();

data.members.push(nickname);

await updateDoc(ref,{members:data.members});

};

window.leaveParty=async function(id){

if(!confirm("파티 지원을 취소하시겠습니까?")) return;

const ref=doc(db,"parties",id);

const snap=await getDoc(ref);

let members=snap.data().members.filter(m=>m!==nickname);

await updateDoc(ref,{members});

};

window.kickMember=async function(id,member){

if(!confirm(member+" 님을 파티에서 내보내시겠습니까?")) return;

const ref=doc(db,"parties",id);

const snap=await getDoc(ref);

let data=snap.data();

let members=data.members.filter(m=>m!==member);

await updateDoc(ref,{members});

};

window.deleteParty=async function(id){

if(!confirm("이 파티를 삭제하시겠습니까?")) return;

await deleteDoc(doc(db,"parties",id));

};

</script>

</body>

</html>
