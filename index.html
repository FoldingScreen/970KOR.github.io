<!DOCTYPE html>

<html>

<head>
<meta charset="UTF-8">
<title>970KOR 바이킹의 역습</title>

<style>

body{
font-family:sans-serif;
text-align:center;
margin-top:40px;
}

input,select{
padding:8px;
margin:5px;
}

button{
padding:8px 16px;
margin:5px;
cursor:pointer;
}

#main{
display:none;
}

#partyGrid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:15px;
max-width:900px;
margin:auto;
}

.partyCard{
border:1px solid #ccc;
border-radius:8px;
padding:10px;
background:#f8f8f8;
}

.members{
font-size:13px;
color:#444;
}

</style>

</head>

<body>

<!-- 로그인 -->

<div id="login">

<h2>970KOR 로그인</h2>

<input id="nickname" placeholder="닉네임">

<button onclick="login()">로그인</button>

</div>

<!-- 메인 -->

<div id="main">

<h1>970KOR 바이킹의 역습</h1>

<button onclick="logout()">로그아웃</button>

<h3>파티 생성</h3>

<input id="partyName" placeholder="파티 이름">

<select id="limit">

<option value="2">2명</option>
<option value="3">3명</option>
<option value="4">4명</option>
<option value="5">5명</option>
<option value="6">6명</option>

</select>

<button onclick="createParty()">파티 생성</button>

<h2>파티 목록</h2>

<div id="partyGrid"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import {
getFirestore,
collection,
addDoc,
doc,
updateDoc,
deleteDoc,
onSnapshot
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {
apiKey:"AIzaSyBu2RrQn8cAwwWaLtw5O8Omwn4-NzHWuc0",
authDomain:"kor-app-fa47e.firebaseapp.com",
projectId:"kor-app-fa47e",
storageBucket:"kor-app-fa47e.firebasestorage.app",
messagingSenderId:"397749083935",
appId:"1:397749083935:web:b2bd8498b943aec5099a2a"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

let nickname="";

window.login=function(){

nickname=document.getElementById("nickname").value;

if(!nickname){
alert("닉네임 입력");
return;
}

document.getElementById("login").style.display="none";
document.getElementById("main").style.display="block";

};

window.logout=function(){

nickname="";
location.reload();

};

window.createParty=async function(){

const name=document.getElementById("partyName").value;
const limit=parseInt(document.getElementById("limit").value);

if(!name){
alert("파티 이름 입력");
return;
}

await addDoc(collection(db,"parties"),{

name:name,
leader:nickname,
members:[nickname],
limit:limit

});

};

const partyGrid=document.getElementById("partyGrid");

onSnapshot(collection(db,"parties"),snapshot=>{

partyGrid.innerHTML="";

snapshot.forEach(docSnap=>{

const data=docSnap.data();
const members=data.members||[];

const card=document.createElement("div");
card.className="partyCard";

card.innerHTML=`

<b>${data.name}</b>

<br>파티장 : ${data.leader}

<br>${members.length}/${data.limit}

<div class="members">

${members.join(", ") || "멤버 없음"}

</div>

<br>

<button onclick="joinParty('${docSnap.id}')">지원</button>

<button onclick="leaveParty('${docSnap.id}')">지원취소</button>

${data.leader===nickname
? `<button onclick="deleteParty('${docSnap.id}')">삭제</button>`
: ""}

`;

partyGrid.appendChild(card);

});

});

window.joinParty=async function(id){

const ref=doc(db,"parties",id);

const snap=await (await fetch(
`https://firestore.googleapis.com/v1/projects/kor-app-fa47e/databases/(default)/documents/parties/${id}`
)).json();

let members=snap.fields.members?.arrayValue?.values?.map(v=>v.stringValue)||[];
let limit=parseInt(snap.fields.limit.integerValue);

if(members.includes(nickname)){
alert("이미 참가");
return;
}

if(members.length>=limit){
alert("정원 초과");
return;
}

members.push(nickname);

await updateDoc(ref,{members});

};

window.leaveParty=async function(id){

const ref=doc(db,"parties",id);

const snap=await (await fetch(
`https://firestore.googleapis.com/v1/projects/kor-app-fa47e/databases/(default)/documents/parties/${id}`
)).json();

let members=snap.fields.members?.arrayValue?.values?.map(v=>v.stringValue)||[];

members=members.filter(m=>m!==nickname);

await updateDoc(ref,{members});

};

window.deleteParty=async function(id){

if(confirm("파티 삭제?")){

await deleteDoc(doc(db,"parties",id));

}

};

</script>

</body>

</html>
