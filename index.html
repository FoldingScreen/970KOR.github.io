<!DOCTYPE html>

<html>

<head>
<meta charset="UTF-8">
<title>970KOR 바이킹의 역습</title>

<style>

body{
font-family:sans-serif;
text-align:center;
margin-top:60px;
}

ul{
list-style:none;
padding:0;
}

input,select{
padding:10px;
margin:5px;
}

button{
padding:10px 20px;
margin:5px;
}

#main{
display:none;
}

.party{
border:1px solid #ccc;
padding:10px;
margin:10px auto;
width:300px;
}

</style>

</head>

<body>

<!-- 로그인 화면 -->

<div id="login">

<h2>970KOR 로그인</h2>

<input id="nickname" placeholder="닉네임">

<button onclick="login()">로그인</button>

</div>

<!-- 메인 화면 -->

<div id="main">

<h1>970KOR 바이킹의 역습</h1>

<h3>파티 생성</h3>

<input id="partyName" placeholder="파티 이름">

<select id="limit">
<option value="4">4명</option>
<option value="6">6명</option>
<option value="8">8명</option>
</select>

<button onclick="createParty()">파티 생성</button>

<h2>파티 목록</h2>

<div id="partyList"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, updateDoc, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBu2RrQn8cAwwWaLtw5O8Omwn4-NzHWuc0",
  authDomain: "kor-app-fa47e.firebaseapp.com",
  projectId: "kor-app-fa47e",
  storageBucket: "kor-app-fa47e.firebasestorage.app",
  messagingSenderId: "397749083935",
  appId: "1:397749083935:web:b2bd8498b943aec5099a2a"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let nickname=""

window.login=function(){

nickname=document.getElementById("nickname").value

if(nickname===""){
alert("닉네임 입력")
return
}

document.getElementById("login").style.display="none"
document.getElementById("main").style.display="block"

loadParties()

}

window.createParty = async function(){

let name=document.getElementById("partyName").value
let limit=parseInt(document.getElementById("limit").value)

if(name===""){
alert("파티 이름 입력")
return
}

await addDoc(collection(db,"parties"),{

name:name,
leader:nickname,
members:[nickname],
limit:limit

})

loadParties()

}

async function loadParties(){

let list=document.getElementById("partyList")
list.innerHTML=""

const querySnapshot = await getDocs(collection(db,"parties"))

querySnapshot.forEach((p)=>{

let data=p.data()
let members=data.members||[]

let div=document.createElement("div")
div.className="party"

div.innerHTML=`

<b>${data.name}</b> (${members.length}/${data.limit})  
<br>파티장 : ${data.leader}

<br><br>멤버 : ${members.join(", ") || "없음"}

<br><br>

<button onclick="joinParty('${p.id}')">지원</button>

<button onclick="leaveParty('${p.id}')">지원취소</button>

${data.leader===nickname ? `<button onclick="deleteParty('${p.id}')">파티 삭제</button>` : ""}

`

list.appendChild(div)

})

}

window.joinParty = async function(id){

const ref=doc(db,"parties",id)

const querySnapshot = await getDocs(collection(db,"parties"))

querySnapshot.forEach(async(p)=>{

if(p.id===id){

let data=p.data()
let members=data.members||[]

if(members.includes(nickname)){
alert("이미 참가")
return
}

if(members.length>=data.limit){
alert("정원 초과")
return
}

members.push(nickname)

await updateDoc(ref,{members:members})

loadParties()

}

})

}

window.leaveParty = async function(id){

const ref=doc(db,"parties",id)

const querySnapshot = await getDocs(collection(db,"parties"))

querySnapshot.forEach(async(p)=>{

if(p.id===id){

let data=p.data()
let members=data.members||[]

members=members.filter(m=>m!==nickname)

await updateDoc(ref,{members:members})

loadParties()

}

})

}

window.deleteParty = async function(id){

if(confirm("파티 삭제?")){

await deleteDoc(doc(db,"parties",id))

loadParties()

}

}

</script>

</body>

</html>
