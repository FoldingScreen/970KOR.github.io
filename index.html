<!DOCTYPE html>

<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>970KOR 바이킹의 역습</title>

<style>

body{
font-family:sans-serif;
margin:20px;
text-align:center;
}

#login{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
height:100vh;
}

#login input{
width:260px;
padding:10px;
margin:10px;
font-size:16px;
}

#login button{
width:160px;
padding:10px;
}

#main{
display:none;
}

.topbar{
position:fixed;
top:15px;
right:20px;
font-size:14px;
background:white;
padding:6px 12px;
border-radius:6px;
box-shadow:0 0 5px rgba(0,0,0,0.1);
}

button{
border:1px solid #aaa;
background:#f3f3f3;
border-radius:4px;
padding:6px 10px;
cursor:pointer;
}

.layout{
display:flex;
gap:30px;
margin-top:30px;
}

.column{
display:flex;
flex-direction:column;
height:650px;
}

.column.my{flex:1;}
.column.open{flex:4;}
.column.closed{flex:2;}

.scroll{
flex:1;
overflow-y:auto;
}

.gridMy{
display:grid;
grid-template-columns:1fr;
gap:12px;
}

.gridOpen{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:12px;
}

.gridClosed{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:12px;
}

.partyCard{
border:1px solid #ccc;
border-radius:6px;
background:#f8f8f8;
padding:12px;

display:flex;
flex-direction:column;
justify-content:space-between;

min-height:170px;
}

.myParty{
border:3px solid #4CAF50;
background:#eef9ee;
}

.members div{
display:flex;
justify-content:space-between;
}

.cardButtons{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:5px;
margin-top:10px;
}

.openStatus{color:green;}
.closedStatus{color:red;}

.adminPanel{
margin-top:10px;
}

.adminPanel button{
background:#ffe3e3;
border-color:#ff8a8a;
}

/* 모바일 */

@media (max-width:900px){

.layout{
flex-direction:column;
}

.column{
height:auto;
}

.scroll{
overflow-y:visible;
}

.gridOpen{
grid-template-columns:repeat(2,1fr);
}

.gridClosed{
grid-template-columns:1fr;
}

.partyCard{
font-size:16px;
padding:16px;
}

#login input{
width:80%;
max-width:320px;
font-size:18px;
}

#login button{
width:60%;
max-width:200px;
}

.topbar{
position:static;
margin-bottom:10px;
display:flex;
justify-content:flex-end;
}

}

</style>

</head>

<body>

<div id="login">

<h2>970KOR 로그인</h2>

<input id="nickname" placeholder="닉네임" autofocus>

<button onclick="login()">로그인</button>

</div>

<div id="main">

<div class="topbar">

<span id="userLabel"></span>

<button onclick="logout()">로그아웃</button>

</div>

<h1>970KOR 바이킹의 역습</h1>

<input id="partyName" placeholder="파티 이름">

<select id="limit">
<option value="2">2명</option>
<option value="3">3명</option>
<option value="4">4명</option>
<option value="5">5명</option>
<option value="6">6명</option>
</select>

<button onclick="createParty()">파티 생성</button>

<div id="adminPanel" class="adminPanel"></div>

<div class="layout">

<div class="column my">

<h3>⭐ 나의 파티</h3>

<div class="scroll">
<div id="myParty" class="gridMy"></div>
</div>

</div>

<div class="column open">

<h3>🟢 모집중</h3>

<div class="scroll">
<div id="openParty" class="gridOpen"></div>
</div>

</div>

<div class="column closed">

<h3>🔴 모집완료</h3>

<div class="scroll">
<div id="closedParty" class="gridClosed"></div>
</div>

</div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
doc,
getDoc,
getDocs,
setDoc,
updateDoc,
deleteDoc,
onSnapshot
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig={
apiKey:"AIzaSyBu2RrQn8cAwwWaLtw5O8Omwn4-NzHWuc0",
authDomain:"kor-app-fa47e.firebaseapp.com",
projectId:"kor-app-fa47e",
storageBucket:"kor-app-fa47e.firebasestorage.app",
messagingSenderId:"397749083935",
appId:"1:397749083935:web:b2bd8498b943aec5099a2a"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

let nickname="";
const master="병풍";
let admins=[];

/* 관리자 로드 */

async function loadAdmins(){

const snap=await getDocs(collection(db,"admins"));

admins=[];

snap.forEach(d=>{
admins.push(d.id);
});

}

function isAdmin(){

return nickname===master || admins.includes(nickname);

}

/* 자동 로그인 */

window.onload=async function(){

const saved=localStorage.getItem("nickname");

await loadAdmins();

if(saved){
nickname=saved;
showMain();
}

};

window.login=async function(){

const name=document.getElementById("nickname").value;

const ref=doc(db,"users",name);

const snap=await getDoc(ref);

if(snap.exists()){
alert("이미 사용중 닉네임");
return;
}

await setDoc(ref,{});

nickname=name;

localStorage.setItem("nickname",nickname);

showMain();

};

function showMain(){

document.getElementById("login").style.display="none";
document.getElementById("main").style.display="block";

document.getElementById("userLabel").innerText="👤 "+nickname;

if(nickname===master){

document.getElementById("adminPanel").innerHTML=`

<input id="adminName" placeholder="운영진 닉네임">
<button onclick="addAdmin()">운영진 추가</button>
<button onclick="deleteAllParties()">전체 파티 삭제</button>

`;

}

}

/* 운영진 추가 */

window.addAdmin=async function(){

const name=document.getElementById("adminName").value;

await setDoc(doc(db,"admins",name),{});

alert("운영진 추가");

};

/* 전체 삭제 */

window.deleteAllParties=async function(){

if(!confirm("모든 파티 삭제?")) return;

const snap=await getDocs(collection(db,"parties"));

snap.forEach(async p=>{
await deleteDoc(doc(db,"parties",p.id));
});

};

/* 파티 생성 */

window.createParty=async function(){

const name=document.getElementById("partyName").value;
const limit=parseInt(document.getElementById("limit").value);

const snap=await getDocs(collection(db,"parties"));

let blocked=false;

snap.forEach(p=>{
let d=p.data();
if(d.leader===nickname) blocked=true;
if(d.members.includes(nickname)) blocked=true;
});

if(blocked){
alert("이미 파티 참여중");
return;
}

await addDoc(collection(db,"parties"),{
name:name,
leader:nickname,
members:[nickname],
limit:limit
});

};

/* 파티 표시 */

const myGrid=document.getElementById("myParty");
const openGrid=document.getElementById("openParty");
const closedGrid=document.getElementById("closedParty");

onSnapshot(collection(db,"parties"),snapshot=>{

myGrid.innerHTML="";
openGrid.innerHTML="";
closedGrid.innerHTML="";

snapshot.forEach(docSnap=>{

const data=docSnap.data();
const members=data.members;
const isFull=members.length>=data.limit;

const card=document.createElement("div");
card.className="partyCard";

if(members.includes(nickname)){
card.classList.add("myParty");
}

let deleteBtn="";

if(data.leader===nickname || isAdmin()){
deleteBtn=`<button onclick="deleteParty('${docSnap.id}')">삭제</button>`;
}

const membersHTML=members.map(m=>{

let kick="";

if((data.leader===nickname || isAdmin()) && m!==data.leader){
kick=`<button onclick="kickMember('${docSnap.id}','${m}')">❌</button>`;
}

return `<div>${m} ${kick}</div>`;

}).join("");

card.innerHTML=`

<div>

<b>${data.name}</b>

<br>파티장 : ${data.leader}

<div class="${isFull?'closedStatus':'openStatus'}">

${isFull?'🔴 모집완료':'🟢 모집중'}

</div>

${members.length}/${data.limit}

<div class="members">
${membersHTML}
</div>

</div>

<div class="cardButtons">

${!isFull?`<button onclick="joinParty('${docSnap.id}')">지원</button>`:""}

<button onclick="leaveParty('${docSnap.id}')">취소</button>

${deleteBtn}

</div>

`;

if(members.includes(nickname)){
myGrid.appendChild(card);
}
else if(isFull){
closedGrid.appendChild(card);
}
else{
openGrid.appendChild(card);
}

});

});

/* 강퇴 */

window.kickMember=async function(partyId,member){

const ref=doc(db,"parties",partyId);

const snap=await getDoc(ref);

let data=snap.data();

let members=data.members.filter(m=>m!==member);

await updateDoc(ref,{members});

};

/* 참가 */

window.joinParty=async function(id){

const snap=await getDocs(collection(db,"parties"));

let already=false;

snap.forEach(p=>{
if(p.data().members.includes(nickname)){
already=true;
}
});

if(already){
alert("이미 다른 파티 참여중");
return;
}

const ref=doc(db,"parties",id);

const docSnap=await getDoc(ref);

let data=docSnap.data();

data.members.push(nickname);

await updateDoc(ref,{members:data.members});

};

/* 탈퇴 */

window.leaveParty=async function(id){

const ref=doc(db,"parties",id);

const snap=await getDoc(ref);

let members=snap.data().members.filter(m=>m!==nickname);

await updateDoc(ref,{members});

};

/* 삭제 */

window.deleteParty=async function(id){

if(confirm("파티 삭제?")){
await deleteDoc(doc(db,"parties",id));
}

};

window.logout=async function(){

await deleteDoc(doc(db,"users",nickname));

localStorage.removeItem("nickname");

location.reload();

};

</script>

</body>

</html>
