<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>970KOR 이벤트</title>

<link rel="stylesheet" href="style.css">

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

</head>

<body>

<!-- 로그인 -->

<div id="loginPage">

<h2>970KOR 로그인</h2>

<input
id="nicknameInput"
placeholder="닉네임"
onkeypress="enterLogin(event)"
>

<button onclick="login()">로그인</button>

</div>


<!-- 메인 -->

<div id="mainPage" style="display:none">

<div class="topbar">

<span id="userLabel"></span>

<div id="adminDropdown" class="dropdown" style="display:none">

<button onclick="toggleAdminMenu()">운영 ▾</button>

<div id="adminMenu" class="dropdownContent">

<button onclick="resetParties()">전체 파티 초기화</button>

<button onclick="grantAdmin()">운영진 권한 부여</button>

<button onclick="openLogs()">운영 로그</button>

</div>

</div>

<button onclick="logout()">로그아웃</button>

</div>


<h1>970KOR 파티</h1>


<!-- 대시보드 -->

<div id="dashboard"></div>

<button onclick="showUsers()">전체 사용자</button>


<br><br>


<input id="partyName" placeholder="파티 이름">

<select id="partyLimit">
<option>2</option>
<option>3</option>
<option selected>4</option>
<option>5</option>
<option>6</option>
</select>

<button onclick="createParty()">파티 생성</button>


<div class="layout">

<div>
<h3>나의 파티</h3>
<div id="myParty"></div>
</div>

<div>
<h3>모집중</h3>
<div id="openParty"></div>
</div>

<div>
<h3>모집완료</h3>
<div id="closedParty"></div>
</div>

</div>


</div>



<!-- 사용자 목록 -->

<div id="userModal" class="modal">

<div class="modalContent">

<h3>전체 사용자</h3>

<div id="userList"></div>

<button onclick="closeUsers()">닫기</button>

</div>

</div>



<!-- 운영 로그 -->

<div id="logModal" class="modal">

<div class="modalContent">

<h3>운영 로그</h3>

<div id="logList"></div>

<button onclick="closeLogs()">닫기</button>

</div>

</div>



<script src="script.js"></script>

</body>
</html>
