<!DOCTYPE html>

<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>970KOR 바이킹</title>

<style>

body{
font-family:sans-serif;
margin:20px;
text-align:center;
}

#login{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
height:100vh;
}

.topbar{
position:fixed;
top:15px;
right:20px;
}

.dropdown{
display:inline-block;
position:relative;
}

.dropdownContent{
display:none;
position:absolute;
background:white;
border:1px solid #ccc;
right:0;
}

.dropdown:hover .dropdownContent{
display:block;
}

.dropdownContent button{
display:block;
width:170px;
}

/* 카드 */

.partyCard{
border-radius:6px;
padding:12px;
min-height:170px;
display:flex;
flex-direction:column;
justify-content:space-between;
}

.cardMy{background:#fff3b0;}
.cardOpen{background:#e8f8e8;}
.cardClosed{background:#eeeeee;}

.layout{
display:flex;
gap:30px;
margin-top:30px;
}

.gridOpen{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:12px;
}

.gridClosed{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:12px;
}

.gridMy{
display:grid;
gap:12px;
}

/* 모달 */

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.4);
}

.modalContent{
background:white;
padding:20px;
width:350px;
margin:100px auto;
max-height:70%;
overflow:auto;
}

.userJoin{color:green;}
.userNot{color:#444;}

</style>

</head>

<body>

<div id="login">

<h2>970KOR 로그인</h2>

<input id="nickname" placeholder="닉네임">

<button onclick="login()">로그인</button>

</div>

<div id="main" style="display:none">

<div class="topbar">

<span id="userLabel"></span>

<span id="adminMenu"></span>

<button onclick="logout()">로그아웃</button>

</div>

<h1 id="title">970KOR 바이킹</h1>

<div id="dashboard"></div>

<button onclick="showUsers()">전체목록</button>

<br><br>

<input id="partyName" placeholder="파티 이름">

<select id="limit">
<option>2</option>
<option>3</option>
<option>4</option>
<option>5</option>
<option>6</option>
</select>

<button onclick="createParty()">파티 생성</button>

<div class="layout">

<div>

<h3>⭐ 나의 파티</h3>

<div id="myParty" class="gridMy"></div>

</div>

<div>

<h3 id="openTitle">🟢 모집중</h3>

<div id="openParty" class="gridOpen"></div>

</div>

<div>

<h3 id="closedTitle">🔴 모집완료</h3>

<div id="closedParty" class="gridClosed"></div>

</div>

</div>

</div>

<!-- 사용자 목록 -->

<div id="userModal" class="modal">

<div class="modalContent">

<h3>전체 사용자</h3>

<div id="userList"></div>

<br>

<button onclick="closeUsers()">닫기</button>

</div>

</div>

<!-- 로그 모달 -->

<div id="logModal" class="modal">

<div class="modalContent">

<h3>운영 로그</h3>

<div id="logList"></div>

<br>

<button onclick="closeLog()">닫기</button>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js"

import {
getFirestore,
collection,
addDoc,
doc,
getDoc,
getDocs,
setDoc,
updateDoc,
deleteDoc,
onSnapshot
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js"

const firebaseConfig={
apiKey:"AIzaSyBu2RrQn8cAwwWaLtw5O8Omwn4-NzHWuc0",
authDomain:"kor-app-fa47e.firebaseapp.com",
projectId:"kor-app-fa47e",
storageBucket:"kor-app-fa47e.firebasestorage.app",
messagingSenderId:"397749083935",
appId:"1:397749083935:web:b2bd8498b943aec5099a2a"
}

const app=initializeApp(firebaseConfig)
const db=getFirestore(app)

let nickname=""
let allUsers=[]
let partyUsers=[]

/* 로그인 */

window.login=async function(){

const name=document.getElementById("nickname").value

const ref=doc(db,"users",name)

const snap=await getDoc(ref)

if(!snap.exists()){
await setDoc(ref,{created:Date.now()})
}

nickname=name

showMain()

startRealtime()

}

/* 메인 */

function showMain(){

document.getElementById("login").style.display="none"
document.getElementById("main").style.display="block"

document.getElementById("userLabel").innerText="👤 "+nickname

if(nickname==="병풍"){

document.getElementById("adminMenu").innerHTML=

`<div class="dropdown">
<button>운영 ▼</button>
<div class="dropdownContent">
<button onclick="resetParties()">전체 파티 초기화</button>
<button onclick="addAdmin()">운영진 지정</button>
<button onclick="forceKick()">강제 탈퇴</button>
</div>
</div>`

}

}

/* 로그아웃 */

window.logout=function(){
location.reload()
}

/* 파티 생성 */

window.createParty=async function(){

const name=document.getElementById("partyName").value

const limit=parseInt(document.getElementById("limit").value)

if(!name){
alert("파티 이름 입력")
return
}

const snap=await getDocs(collection(db,"parties"))

let blocked=false
let duplicate=false

snap.forEach(p=>{

let d=p.data()

if(d.name===name) duplicate=true

if(d.leader===nickname) blocked=true
if(d.members.includes(nickname)) blocked=true

})

if(duplicate){
alert("이미 존재하는 파티 이름입니다")
return
}

if(blocked){
alert("이미 파티 참여중")
return
}

await addDoc(collection(db,"parties"),{
name:name,
leader:nickname,
members:[nickname],
limit:limit,
created:Date.now()
})

}

/* 실시간 */

async function startRealtime(){

const usersSnap=await getDocs(collection(db,"users"))

allUsers=[]

usersSnap.forEach(u=>{

if(!u.id.startsWith("테스트")){
allUsers.push(u.id)
}

})

onSnapshot(collection(db,"parties"),snapshot=>{
render(snapshot)
})

}

/* 렌더 */

function render(snapshot){

const myGrid=document.getElementById("myParty")
const openGrid=document.getElementById("openParty")
const closedGrid=document.getElementById("closedParty")

myGrid.innerHTML=""
openGrid.innerHTML=""
closedGrid.innerHTML=""

let totalUsers=new Set()

let openCount=0
let closedCount=0

snapshot.forEach(docSnap=>{

const data=docSnap.data()

const members=data.members

const isFull=members.length>=data.limit

members.forEach(m=>{
if(!m.startsWith("테스트")){
totalUsers.add(m)
}
})

if(isFull) closedCount++
else openCount++

const card=document.createElement("div")

let cls="partyCard"

if(members.includes(nickname)) cls+=" cardMy"
else if(isFull) cls+=" cardClosed"
else cls+=" cardOpen"

card.className=cls

const date=new Date(data.created)

const time=

(date.getMonth()+1)+"/"+
date.getDate()+" "+
date.getHours()+":"+
String(date.getMinutes()).padStart(2,"0")

const memberHTML=members.map(m=>{

let name=m

if(m===nickname) name="⭐ "+m
if(m===data.leader) name="👑 "+name

return `<div>${name}</div>`

}).join("")

card.innerHTML=

`<b>${data.name}</b>
<div>${time}</div>
<br>
${members.length}/${data.limit}
<div>${memberHTML}</div>`

if(members.includes(nickname)) myGrid.appendChild(card)
else if(isFull) closedGrid.appendChild(card)
else openGrid.appendChild(card)

})

partyUsers=[...totalUsers]

const notJoin=allUsers.filter(u=>!partyUsers.includes(u))

document.getElementById("dashboard").innerText=

"총 인원 "+allUsers.length+
" | 참여 "+partyUsers.length+
" | 미참여 "+notJoin.length

document.getElementById("openTitle").innerText="🟢 모집중 ("+openCount+")"
document.getElementById("closedTitle").innerText="🔴 모집완료 ("+closedCount+")"

}

/* 사용자 목록 */

window.showUsers=function(){

const modal=document.getElementById("userModal")

const list=document.getElementById("userList")

list.innerHTML=""

let joined=[]
let notJoined=[]

allUsers.forEach(u=>{

if(partyUsers.includes(u)){
joined.push(u)
}else{
notJoined.push(u)
}

})

joined.sort()
notJoined.sort()

joined.forEach(u=>{
list.innerHTML+=`<div class="userJoin">🟢 ${u}</div>`
})

notJoined.forEach(u=>{
list.innerHTML+=`<div class="userNot">⚫ ${u}</div>`
})

modal.style.display="block"

}

window.closeUsers=function(){
document.getElementById("userModal").style.display="none"
}

/* 운영 */

window.resetParties=async function(){

if(!confirm("전체 파티 초기화하시겠습니까?")) return

const snap=await getDocs(collection(db,"parties"))

snap.forEach(async p=>{
await deleteDoc(doc(db,"parties",p.id))
})

}

window.addAdmin=async function(){

let name=prompt("운영진 닉네임")

if(!name) return

await setDoc(doc(db,"admins",name),{})

alert("운영진 지정 완료")

}

window.forceKick=async function(){

let name=prompt("강제 탈퇴 닉네임")

if(!name) return

if(!confirm("정말 탈퇴 처리하시겠습니까?")) return

await deleteDoc(doc(db,"users",name))

alert("탈퇴 완료")

}

/* 로그 */

let titleClick=0

document.getElementById("title").onclick=function(){

titleClick++

if(titleClick>=5){
openLog()
titleClick=0
}

}

async function openLog(){

const snap=await getDocs(collection(db,"logs"))

const list=document.getElementById("logList")

list.innerHTML=""

snap.forEach(docSnap=>{

let d=docSnap.data()

let date=new Date(d.time)

list.innerHTML+=

`<div>

${date.toLocaleString()}  
${d.admin}  
${d.action}  
${d.target}

</div><hr>`

})

document.getElementById("logModal").style.display="block"

}

window.closeLog=function(){
document.getElementById("logModal").style.display="none"
}

</script>

</body>
</html>
